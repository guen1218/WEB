<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width : 500px;
            height : 500px;
            background-color : red;
            /* visibility: hidden; */
            display: none;
        }

        img{
            width : 50%;
            height : 50%;
            margin : 25%;
        }

        body{
            background-color:green;
            background-image: url('../images/dog.png');
            background-repeat: no-repeat;
            /* background-position: 100px 50px; */
            /* background-size: cover; */     
        }

        #div01{
            position:absolute;
            padding: 30px;
            width:700px;
            height:400px;
            top:500px;
            left:500px;
            border:30px solid white;
            display : block;
            background-image:url(../images/dog.png);
            background-repeat: no-repeat;
            background-size:cover;
            background-origin:border-box;
        }
    </style>
</head>
<body>
    <div>
        <img src="../images/dog.png" alt="강아지사진">
    </div>
    <div id="div01">
    </div>
</body>
</html>
