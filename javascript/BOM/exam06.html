<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let checkForm = ()=>{
            let searchType = document.searchForm.searchType
            let searchword = document.searchForm.searchWord

            if(searchType.selectedIndex === 0){
                alert('검색항목을 선택하세요');
                searchType.focus()
                return false;
            }

            if(searchword.value == ''){
                alert('검색어를 입력하세요');
                searchword.focus()
                return false;
            }

            if(searchword.value.length < 2){
                alert('검색어는 2글자이상 입력해주세요');
                searchword.focus()
                return false;
            }

            return true;
        }
    </script>
</head>
<body>
    <form action="https://kanime-3b014.web.app/" name="searchForm" onsubmit="return checkForm()">
        <select name="searchType">
            <option>선택하세요</option>
            <option>제목</option>
            <option>작성자</option>
        </select>
        <input type="search" name="searchWord">
        <button type="submit">검색</button>
    </form>
</body>
</html>
