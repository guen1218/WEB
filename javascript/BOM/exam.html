<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body *{
            border: 5px solid;
            margin: 20px;
        }
        div{
            border-color: red;
        }

        h2{
            border-color: aqua;
        }

        span{
            border-color: bisque;
        }
    </style>

    <script>
        window.onload = function(){
            let divTag = document.querySelector('div')
            divTag.addEventListener('click', function(){
                alert('div 이ㅣㅣㅣㅇㅇ')
            })
            let h2Tag = document.querySelector('h2')
            h2tag.addEventListener('click'), function(){
                alert('h2')
            }
            let spanTag = document.querySelector('span')
            h2tag.addEventListener('click'), function(){
                alert('span')
            }
        }
    </script>
</head>
<body>
    <div>
        <h2>
            <span>
                하이
            </span>
        </h2>
    </div>
    
</body>
</html>
