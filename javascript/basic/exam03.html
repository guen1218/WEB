<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let num = prompt("정수를입력하세용")
        console.log(num, typeof num)
        num = Number(num)
        console.log(num, typeof num)

        if (num % 2 == 0){
            console.log(num + " : 짝수")
        }else{
            console.log(num + " : 홀수")
        }

        switch(num % 2){
            case 0 : 
                console.log(num + " : 짝수") 
                break
            default : console.log(num + " : 홀수")
        }

        // 조건 ? 참일때 : 거짓
        let msg = num % 2 == 0? "짝수" : "홀수"
        console.log(num +" : "+ msg)
        console.log(`${num} : ${msg}`)
    </script>
</body>
</html>
