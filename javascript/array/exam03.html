<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let arr = [10,20,30,40,50,4,7,2]
        document.write(`before ${arr}<br>`)
        // for(let i = 0; i < arr.length; i++){
        //     arr[i] = arr[i] + 100
        // }

        arr = arr.map(function(element){
            document.write("<hr>")
            return element + 100
        }) 
        document.write(`after ${arr}<br>`)

        let arr2 = arr.filter(function(element){
            return element % 3 == 0
        })
        document.write(`arr2: ${arr2}<br>`)
    </script>
</head>
<body>
    
</body>
</html>
