<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = prompt("숫자 입력")
        for(let i = 1; i <= a; i++){
            if (i % 10 == 0){
                for(let j = 0; j < i / 10; j ++){
                    document.write("뽀")
                }
                if(String(i).includes("3")){
                    document.write("짝")
                }
                if(String(i).includes("6")){
                    document.write("짝")
                }
                if(String(i).includes("9")){
                    document.write("짝")
                }
                document.write("숑<br>")
                continue
            }
            if (String(i).includes("3") || String(i).includes("6") || String(i).includes("9")){
                for(let k = 0; k < String(i).match(/[369]/g).length; k++){
                    document.write("짝")
                }
                document.write("<br>")
                continue
            }
            document.write(i,"<br>")
        }
    </script>
</body>
</html>
