<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let c = 90, y = 60, m = 45
        let ccount= 1, ycount = 1, mcount = 1
        let ctemp = c, ytemp = y, mtemp = m
        document.write("<운동장 한바퀴 도는 소요시간><br>")
        document.write(`철수  ${c}초<br>`)
        document.write(`영희  ${y}초<br>`)
        document.write(`민수  ${m}초<br><br>`)

        while(c != y || c != m || y != m){
            switch(Math.min(c,y,m)){
                case c : {
                    c += ctemp
                    ccount ++
                    break;
                }
                case y : {
                    y += ytemp
                    ycount++
                    break;
                }
                case m : {
                    m += mtemp
                    ++mcount
                    break;
                }
            }
        }

        document.write(`8시 출발 후 다시 출발점에서 만나는 시간 : 8시 ${c/60}분<br>`)
        document.write(`8시 ${c/60}분에 철수는 총  ${ccount}바퀴를 뛰었음<br>`)
        document.write(`8시 ${c/60}분에 영희는 총  ${ycount}바퀴를 뛰었음<br>`)
        document.write(`8시 ${c/60}분에 민수는 총  ${mcount}바퀴를 뛰었음<br>`)
    </script>
</body>
</html>
