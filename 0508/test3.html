<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let count=0
        for(let i=10; i<=50; i++){
            if(Math.floor(i/10) % 2 == 0 && i % 3 == 0 && i % 2 == 1){
                document.write(i+"&nbsp;")
                count++
            }
        }
        document.write("<br>총 개수 : "+count+"개")
    </script>
</body>
</html>
