<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let count=0
        for(let i = 100; i <= 200; i++){
            if(String(i).includes("4") && i % 6 == 0){
                document.write(i+"&nbsp;")
                count++
            }
        }
        document.write("<br>총 개수 : "+count+"개")
    </script>
</body>
</html>
