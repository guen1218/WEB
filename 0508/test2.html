<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        do{
            var st = Number(prompt("시작단 입력"))
            var en = Number(prompt("종료단 입력"))
        }while(st > en)

        for(let i = st; i <= en; i++){
            document.write(`*** ${i}단 ***<br>`)
            for(let j = 1; j <= 9; j++){
                document.write(`${i} * ${j} = ${i*j}<br>`)
            }
            document.write("<br>")
        }
    </script>
</body>
</html>
