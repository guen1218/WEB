<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = prompt("정수를 입력하세요 : ")
        document.write("<1 ~ "+a+" 사이의 정수값을 한 라인에 5개씩 출력하기><br>")
        for(let i = 1; i <= a; i++){
            document.write(i+" ")
            if(i % 5 === 0){
                document.write("<br>")
            }
        }    
        document.write("<hr><"+a+"의 약수 출력><br>")
        let count = 0
        for(let i = 1; i <= a; i++){
            if(a % i === 0){
                document.write(i+"&nbsp;")
                count++
            }
        }    
        document.write("<br>약수의 총개수 : "+count+"개")
    </script>
</body>
</html>
